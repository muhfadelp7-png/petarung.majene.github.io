    animation: gradientMove 8s ease infinite;
    transition: all 0.4s ease;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Efek radar sweep */
h1::after {
    content: "";

    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;

        rgba(255,255,255,0.8) 50%,
        rgba(255,255,255,0) 100%
    );
    transform: skewX(-25deg);
    animation: sweep 4s infinite;
}

/* Animasi sweep */
@keyframes sweep {
    0% { left: -100%; }
    100% { left: 150%; }
}

h1:hover {

        // Fungsi untuk menghitung jumlah berdasarkan jenis
        function countByType() {
            const counts = {
                "Rumah Tinggal": 0,
                "Perumahan dan Perdagangan Jasa": 0,
                "Rumah Kos": 0,
                "Hunian/Perdagangan & Jasa": 0,

                "Perumahan": 0,
                "Tower Telekomunikasi": 0,
                "Rumah Makan": 0,
                "Industri Minuman": 0,
                "Toko": 0
            };
            
            buildingData.forEach(building => {
                if (counts.hasOwnProperty(building.type)) {
                    counts[building.type]++;
                } else {
                    // Tambahkan jenis baru jika belum ada di daftar
                    counts[building.type] = 1;
                }
            });
            
            return counts;
        }

        // Fungsi untuk mengunduh data bangunan (fungsi ini tidak akan dipanggil lagi jika tombol dihapus)
        function downloadBuildingData(building) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(building, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `data_bangunan_${building.id}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // Tambahkan marker untuk setiap data bangunan
        const markers = [];
        buildingData.forEach(building => {
            // Tentukan warna marker berdasarkan status
            let markerColor;
            switch(building.status) {
                case "Disetujui":
                    markerColor = "green";
                    break;
                case "Proses":
                    markerColor = "orange";
                    break;
                case "Ditolak":
                    markerColor = "red";
                    break;
                default:
                    markerColor = "blue";
            }
            
            // Buat custom icon
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color: ${markerColor}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white;"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            
            // Tambahkan marker ke peta
            const marker = L.marker([building.lat, building.lng], {icon: customIcon})
                .addTo(map)
                .bindPopup(`
                    <div class="info-window">
                        <h3>${building.name}</h3>
                        <p><strong>Alamat:</strong> ${building.address}</p>
                        <p><strong>Jenis:</strong> ${building.type}</p>
                        <p><strong>Status:</strong> ${building.status}</p>
                        <p><strong>Tanggal:</strong> ${building.approvalDate}</p>
                        <p><strong>Luas:</strong> ${building.area}</p>
                        <p><strong>Lantai:</strong> ${building.floors}</p>
                        <!-- Baris berikut telah dihapus/dikomentari untuk menghilangkan tombol download -->
                        <!-- <button onclick='downloadBuildingData(${JSON.stringify(building)})'>Download Data</button> -->
                    </div>
                `);
            
            // Simpan referensi marker dengan data bangunan
            marker.buildingData = building;
            markers.push(marker);
        });

        // Fungsi untuk menampilkan data di sidebar
        function renderDataList(data) {
            const dataList = document.getElementById('data-list');
            dataList.innerHTML = '';
            
            data.forEach(building => {
                const item = document.createElement('div');
                item.className = 'data-item';
                item.innerHTML = `
                    <h3>${building.name}</h3>
                    <p><strong>Alamat:</strong> ${building.address}</p>
                    <p><strong>Jenis:</strong> ${building.type}</p>
                    <p><strong>Status:</strong> ${building.status}</p>
                    <p><strong>Tanggal:</strong> ${building.approvalDate}</p>
                `;
                
                item.addEventListener('click', () => {
                    // Buka popup marker yang sesuai
                    const marker = markers.find(m => m.buildingData.id === building.id);
                    if (marker) {
                        map.setView([building.lat, building.lng], 16);
                        marker.openPopup();
                    }
                });
                
                dataList.appendChild(item);
            });
        }

        // Fungsi untuk mengisi filter dropdown
        function populateFilters() {
            const kelurahanFilter = document.getElementById('kelurahan-filter');
            const kecamatanFilter = document.getElementById('kecamatan-filter');
            const yearFilter = document.getElementById('year-filter');
            const typeFilter = document.getElementById('type-filter');
            
            // Dapatkan nilai unik untuk setiap filter
            let kelurahans = [...new Set(buildingData.map(b => b.kelurahan))];
            let kecamatans = [...new Set(buildingData.map(b => b.kecamatan))];
            let years = [...new Set(buildingData.map(b => b.approvalDate.substring(0, 4)))];
            
            // Urutkan secara alfabetis/numerik
            kelurahans.sort();
            kecamatans.sort();
            years.sort((a, b) => a - b); // Urutkan tahun secara numerik
            
            // Hitung jumlah berdasarkan jenis
            const typeCounts = countByType();
            
            // Isi filter kelurahan
            kelurahans.forEach(kel => {
                const option = document.createElement('option');
                option.value = kel;
                option.textContent = kel;
                kelurahanFilter.appendChild(option);
            });
            
            // Isi filter kecamatan
            kecamatans.forEach(kec => {
                const option = document.createElement('option');
                option.value = kec;
                option.textContent = kec;
                kecamatanFilter.appendChild(option);
            });
            
            // Isi filter tahun
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearFilter.appendChild(option);
            });
            
            // Isi filter jenis dengan jumlah data dan urutkan berdasarkan nama jenis
            const sortedTypes = Object.keys(typeCounts).sort();
            sortedTypes.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = `${type} (${typeCounts[type]})`;
                typeFilter.appendChild(option);
            });
        }

        // Fungsi untuk memfilter data
        function filterData() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const kelurahanValue = document.getElementById('kelurahan-filter').value;
            const kecamatanValue = document.getElementById('kecamatan-filter').value;
            const statusValue = document.getElementById('status-filter').value;
            const typeValue = document.getElementById('type-filter').value;
            const yearValue = document.getElementById('year-filter').value;
            
            const filteredData = buildingData.filter(building => {
                // Filter berdasarkan pencarian teks
                const matchesSearch = building.name.toLowerCase().includes(searchText) || 
                                     building.address.toLowerCase().includes(searchText);
                
                // Filter berdasarkan kelurahan
                const matchesKelurahan = !kelurahanValue || building.kelurahan === kelurahanValue;
                
                // Filter berdasarkan kecamatan
                const matchesKecamatan = !kecamatanValue || building.kecamatan === kecamatanValue;
                
                // Filter berdasarkan status
                const matchesStatus = !statusValue || building.status === statusValue;
                
                // Filter berdasarkan jenis
                const matchesType = !typeValue || building.type === typeValue;
                
                // Filter berdasarkan tahun
                const matchesYear = !yearValue || building.approvalDate.startsWith(yearValue);
                
                return matchesSearch && matchesKelurahan && matchesKecamatan && matchesStatus && matchesType && matchesYear;
            });
            
            // Tampilkan data yang difilter
            renderDataList(filteredData);
            
            // Sembunyikan/tampilkan marker berdasarkan filter
            markers.forEach(marker => {
                const isVisible = filteredData.some(b => b.id === marker.buildingData.id);
                if (isVisible) {
                    map.addLayer(marker);
                } else {
                    map.removeLayer(marker);
                }
            });
        }
